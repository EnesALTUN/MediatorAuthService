version: '3.4'

services:
  mediatorauthservice.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5216
      - ConnectionStrings:Default=${SQL_CONNECTION_STRING}
      - ElasticSearch:Uri=${ELASTIC_URI}
      - JwtTokenOption:SecurityKey=${JWT_SECURITY_KEY}
      - MediatR:LicenseKey=${MEDIATR_LICENSE_KEY}
    ports:
      - "5216:5216"
      - "7216:7216"
    networks:
      - net_backendservices
      - sql_db
      - elastic_net
    depends_on:
      s_sqlserver:
        condition: service_started
      s_elasticsearch:
        condition: service_healthy
    restart: on-failure

  s_sqlserver:
    user: root
    ports: 
      - 1453:1433
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_PASSWORD}
    volumes:
      - mediator_sqlserver_data:/var/opt/mssql/data
      - mediator_sqlserver_log:/var/opt/mssql/log
    networks:
      - sql_db

  s_elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - mediator_elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elastic_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  s_kibana:
    image: docker.elastic.co/kibana/kibana:9.0.0
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTIC_URI}
    ports:
      - "5601:5601"
    networks:
      - elastic_net
    depends_on:
      s_elasticsearch:
        condition: service_started

networks:
  net_backendservices:
    driver: bridge
    external: true
  sql_db:
    driver: bridge
    external: true
  elastic_net:
    driver: bridge

volumes:
  mediator_sqlserver_data:
  mediator_sqlserver_log:
  mediator_elasticsearch_data: